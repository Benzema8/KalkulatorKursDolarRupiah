<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Document</title>
  <style>
    body{
      font-family: Arial, sans serif;
      background:#f9f9f9;
      text-align: center;
      padding:50px;
    }
    .container{
      background:white;
      padding:20px;
      border-radius:12px;
      box-shadow:0 4px 8px rgba(0,0,0,0.2);
      display:inline-block;
    }
    input, button{
      padding:10px;
      margin:8px;
      font-size:16px;
      border-radius:16px;
      border:1px solid #ccc;
    }
    button{
      background:#2196f3;
      color:white;
      cursor:pointer;
    }
    button:hover{
      background:#1976d2;
    }
    .hasil{
      margin-top:15px;
      font-size:20px;
      font-weight:bold;
      color:#333;
      border:1px solid black;
      border-radius:20px;
    }
    footer{
      margin-top:40px;
      font-size:14px;
      color:#666;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Kurs USD -> Rupiah</h2>
    <input type="number" id="usd" placeholder="Masukan mata uang">
    <button onclick="konversi()">Konversi</button>
    <div class="hasil" id="hasil"></div>
  </div>
  <footer>
    &copy 2025; kalkulator kurs | Dibuat dengan Nama Depan - Kontigen
  </footer>
  <script>
    function konversi() {
      let kurs = 17243; // 1 USD = Rp 15.000
      let usd = document.getElementById("usd").value;
      let rupiah = usd * kurs;
      document.getElementById("hasil").innerHTML = "Rp" + rupiah.toLocaleString("id-ID");
    }
  </script>
</body>
</html>
